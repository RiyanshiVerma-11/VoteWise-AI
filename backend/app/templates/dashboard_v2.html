<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoteWise AI | Bharat Edition</title>
    <link rel="stylesheet" href="/static/styles/votewise_v2.css?cache=124">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="manifest" href="/static/manifest.json">
    <link rel="icon" href="/static/logo_votewise_ai.png">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        // Dynamically initialize all Google Services with API keys from backend
        async function initGoogleServices() {
            try {
                const res = await fetch('/api/config');
                const config = await res.json();
                window.GOOGLE_MAPS_API_KEY = config.google_maps_api_key || '';

                // --- Google Maps JS SDK (Dynamic Key Loading) ---
                const mapsScript = document.createElement('script');
                mapsScript.src = `https://maps.googleapis.com/maps/api/js?key=${window.GOOGLE_MAPS_API_KEY}&libraries=places,visualization`;
                mapsScript.async = true;
                mapsScript.defer = true;
                mapsScript.onload = () => { window.googleMapsReady = true; };
                document.head.appendChild(mapsScript);

                // --- Google Identity Services (OAuth) ---
                const gsiScript = document.createElement('script');
                gsiScript.src = 'https://accounts.google.com/gsi/client';
                gsiScript.async = true;
                document.head.appendChild(gsiScript);

            } catch (e) {
                console.warn('Google Services init failed:', e);
            }
        }

        if (!sessionStorage.getItem('user')) {
            window.location.href = '/login.html';
        } else {
            initGoogleServices();
        }
    </script>
    <style>
        .lite-mode {
            --primary-gradient: #4f46e5 !important;
            --glass-bg: #ffffff !important;
            --glass-blur: none !important;
        }
        .lite-mode * {
            box-shadow: none !important;
            transition: none !important;
            text-shadow: none !important;
            background-image: none !important;
        }
    </style>
</head>
<body>

    <!-- News Pulse Ticker -->
    <div class="live-ticker">
        <div id="topTicker" class="ticker-content">Loading civic pulse...</div>
    </div>

    <!-- Top Navigation -->
    <nav class="top-nav" role="navigation">
        <div class="nav-brand" onclick="app.showModule('dashboard')" style="display: flex; align-items: center; gap: 1rem; cursor: pointer;" role="link" tabindex="0" aria-label="VoteWise AI Home">
            <img src="/static/logo_votewise_ai.png" alt="VoteWise AI Logo" style="height: 45px; width: auto; object-fit: contain; filter: drop-shadow(0 4px 8px rgba(0,0,0,0.1));">
            <span style="font-weight: 800; font-size: 1.6rem; background: var(--primary-gradient); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: -1.5px;">VoteWise AI</span>
        </div>

        <div class="nav-links">
            <a class="nav-link active" tabindex="0" data-module="dashboard" onclick="app.showModule('dashboard')"><i class="fas fa-th-large"></i> Dashboard</a>
            <a class="nav-link" tabindex="0" data-module="checklist" onclick="app.showModule('checklist')"><i class="fas fa-clipboard-check"></i> Checklist</a>
            <a class="nav-link" tabindex="0" data-module="timeline" onclick="app.showModule('timeline')"><i class="fas fa-history"></i> Timeline</a>
            <a class="nav-link" tabindex="0" data-module="glossary" onclick="app.showModule('glossary')"><i class="fas fa-book"></i> Glossary</a>
            <a class="nav-link" tabindex="0" data-module="mock-id" onclick="app.showModule('mock-id')"><i class="fas fa-id-card"></i> Mock ID</a>
        </div>

        <div style="display: flex; align-items: center; gap: 0.75rem; flex-shrink: 0;">
            <button id="liteModeToggle" onclick="document.body.classList.toggle('lite-mode')" class="btn-primary" style="background: transparent; color: var(--text-body); box-shadow: none; padding: 0.4rem 0.6rem; font-size: 0.75rem;" aria-label="Toggle Low-Bandwidth Mode" title="Toggle Low-Bandwidth Mode">
                <i class="fas fa-bolt"></i> Lite
            </button>

            <div style="position: relative;">
                <select id="langToggle" onchange="app.setLanguage(this.value)" aria-label="Select Language" style="appearance: none; -webkit-appearance: none; background: #f1f5f9; border: 1px solid #e2e8f0; border-radius: 10px; padding: 0.4rem 2rem 0.4rem 0.75rem; font-size: 0.8rem; font-weight: 700; color: var(--text-header); cursor: pointer; font-family: 'Outfit', sans-serif; outline: none;">
                    <option value="en">🇬🇧 English</option>
                    <option value="hi">🇮🇳 हिंदी</option>
                    <option value="mr">🇮🇳 मराठी</option>
                    <option value="ta">🇮🇳 தமிழ்</option>
                    <option value="bn">🇮🇳 বাংলা</option>
                    <option value="te">🇮🇳 తెలుగు</option>
                </select>
                <i class="fas fa-chevron-down" style="position: absolute; right: 0.6rem; top: 50%; transform: translateY(-50%); font-size: 0.65rem; color: var(--text-body); pointer-events: none;"></i>
            </div>
            
            <div class="profile-hub" style="display: flex; align-items: center; gap: 0.5rem; border-left: 1px solid #e2e8f0; padding-left: 0.75rem;">
                <div style="text-align: right;">
                    <div id="userName" style="font-weight: 800; font-size: 0.8rem; color: var(--text-header); white-space: nowrap;">Voter</div>
                    <div id="userPoints" style="font-size: 0.65rem; color: var(--primary); font-weight: 600; white-space: nowrap;">0 Pts | 0% Mastery</div>
                </div>
                <div id="userAvatar" style="width: 36px; height: 36px; background: var(--primary-gradient); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: 900; font-size: 1rem; flex-shrink: 0; overflow: hidden; border: 2px solid white; box-shadow: 0 4px 10px rgba(0,0,0,0.1);">
                    V
                </div>
            </div>
        </div>
    </nav>

    <main class="container" style="padding: 4rem 6%;">
        <header style="margin-bottom: 4rem; text-align: center;">
            <h1 id="pageTitle" class="fade-in" style="font-size: 3rem; font-weight: 800; margin-bottom: 0.5rem;">Election Roadmap</h1>
            <p id="pageSubtitle" class="fade-in" style="font-size: 1.1rem; opacity: 0.8;">Your definitive path to democratic participation</p>
        </header>

        <div id="stepsGrid" class="roadmap-grid"></div>
        <div id="moduleContent" class="module-area"></div>
    </main>

    <!-- Floating AI Trigger -->
    <button class="ai-trigger" aria-label="Open AI Assistant" onclick="event.stopPropagation(); app.toggleChat();" style="position: fixed; bottom: 2rem; right: 2rem; width: 65px; height: 65px; border-radius: 50%; background: var(--primary-gradient); border: none; color: white; font-size: 1.5rem; cursor: pointer; box-shadow: 0 10px 25px rgba(79, 70, 229, 0.4); z-index: 1000;">
        <i class="fas fa-robot"></i>
    </button>

    <!-- Floating AI Panel -->
    <div id="chatPanel" class="ai-panel">
        <div class="ai-header" style="display: flex; justify-content: space-between; align-items: center;">
            <div style="display: flex; align-items: center; gap: 0.75rem;">
                <div style="width: 10px; height: 10px; background: #10b981; border-radius: 50%; box-shadow: 0 0 10px #10b981;"></div>
                <div>
                    <div style="font-weight: 800; font-size: 0.9rem;">VoteWise Guide</div>
                    <div style="font-size: 0.65rem; opacity: 0.8;">Online | Level 6 AI Brain</div>
                </div>
            </div>
            <div style="display: flex; gap: 1rem; align-items: center;">
                <i class="fas fa-times" role="button" aria-label="Close AI Assistant" tabindex="0" style="cursor: pointer;" onclick="app.toggleChat()" onkeypress="if(event.key==='Enter') app.toggleChat()"></i>
            </div>
        </div>
        
        <div id="chatMessages" style="flex: 1; padding: 1.5rem; overflow-y: auto; display: flex; flex-direction: column;"></div>

        <div class="chat-input-area" style="padding: 1.25rem; border-top: 1px solid #f1f5f9; display: flex; gap: 0.75rem;">
            <input type="text" id="userInput" aria-label="Ask a question about elections" placeholder="Ask anything about elections..." style="flex: 1; padding: 0.8rem 1.2rem; border-radius: 14px; border: 1px solid #e2e8f0; outline: none;">
            <button class="btn-primary" aria-label="Send message" onclick="app.handleChatSubmit()" style="padding: 0.8rem; width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; border-radius: 12px;">
                <i class="fas fa-paper-plane"></i>
            </button>
        </div>
    </div>

    <script type="module" src="/static/js/votewise_core.js?v=9"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/static/sw.js');
            });
        }
    </script>
</body>
</html>
